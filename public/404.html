<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Home Finds Studio</title>
  <script>
    // SPA fallback for GitHub Pages
    // Save the intended path so the React router can restore it after loading
    sessionStorage.setItem('__gh_pages_redirect', location.pathname + location.search + location.hash);
    window.location.replace(window.location.origin + '/');
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; text-align: center; padding: 40px; color: #666;">
    Redirecting to Home Finds Studio...
  </p>
</body>
</html>
